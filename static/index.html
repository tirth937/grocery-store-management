<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Food Quality Detective | Freshness Detection</title>
    <meta name="description" content="AI-powered food quality detection system. Detect food freshness, get safety recommendations, and estimate shelf life in real-time.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>

    <main class="container">
        <header class="header">
            <div class="logo">
                <span class="ai-badge">AI</span>
                <h1>Food<span>Detective</span></h1>
            </div>
            <p class="subtitle">Real-time food quality analysis &amp; freshness detection</p>
        </header>

        <section class="main-grid">
            <div class="viewer-section card glass">
                <div class="viewer-header">
                    <div class="controls">
                        <button id="webcamBtn" class="btn secondary">
                            <span class="icon">📷</span> Webcam
                        </button>
                        <button id="uploadBtn" class="btn secondary">
                            <span class="icon">📁</span> Upload
                        </button>
                        <input type="file" id="fileInput" hidden accept="image/*">
                    </div>
                    <div class="status">
                        <span class="status-dot"></span> <span id="statusText">Ready</span>
                    </div>
                </div>

                <div class="video-container">
                    <video id="webcam" autoplay playsinline hidden></video>
                    <canvas id="outputCanvas"></canvas>
                    <div id="dropZone" class="drop-zone">
                        <div class="drop-content">
                            <svg class="upl-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                            </svg>
                            <p>Drop image here or click to upload</p>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="sidebar-section">
                <div class="stats-card card glass">
                    <h3>Detections</h3>
                    <div id="detectionsList" class="detections-list">
                        <p class="empty-state">No food detected yet</p>
                    </div>
                </div>

                <div class="info-card card glass">
                    <h3>Quality Legend</h3>
                    <div class="quality-legend">
                        <div class="legend-item">
                            <span class="legend-dot fresh"></span> Fresh
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot avg"></span> Average
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot bad"></span> Spoiled
                        </div>
                    </div>
                </div>

                <div class="info-card card glass">
                    <h3>Model Info</h3>
                    <div class="model-meta">
                        <div class="meta-item">
                            <span class="label">Engine</span>
                            <span class="val">YOLOv11</span>
                        </div>
                        <div class="meta-item">
                            <span class="label">Quality</span>
                            <span class="val"><span class="feature-tag">Heuristic</span></span>
                        </div>
                        <div class="meta-item">
                            <span class="label">Features</span>
                            <span class="val accent">Freshness · Shelf Life</span>
                        </div>
                    </div>
                </div>
            </aside>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
